<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1>Calculadora</h1>
    </header>
    <main>
        <div class="calc">
            <div class="display" id="display"></div>
            <div class="btns">
                <div class="row"> 
                    <button onclick="clearAll()" class="btn" aria-label="Clear">C</button>
                    <button onclick="backspace()" class="btn" aria-label="Backspace">&lt;</button>
                    <button onclick="pressed('/')" class="btn" aria-label="Divide">/</button>
                </div>
                <div class="row">
                    <button onclick="pressed('7')" class="btn" aria-label="Seven">7</button>
                    <button onclick="pressed('8')" class="btn" aria-label="Eight">8</button>
                    <button onclick="pressed('9')" class="btn" aria-label="Nine">9</button>
                    <button onclick="pressed('*')" class="btn" aria-label="Multiply">*</button>
                </div>
                <div class="row">
                    <button onclick="pressed('4')" class="btn" aria-label="Four">4</button>
                    <button onclick="pressed('5')" class="btn" aria-label="Five">5</button>
                    <button onclick="pressed('6')" class="btn" aria-label="Six">6</button>
                    <button onclick="pressed('+')" class="btn" aria-label="Add">+</button>
                </div>
                <div class="row">
                    <button onclick="pressed('1')" class="btn" aria-label="One">1</button>
                    <button onclick="pressed('2')" class="btn" aria-label="Two">2</button>
                    <button onclick="pressed('3')" class="btn" aria-label="Three">3</button>
                    <button onclick="pressed('-')" class="btn" aria-label="Subtract">-</button>
                </div>
                <div class="row">
                    <button onclick="pressed('0')" class="btn" aria-label="Zero">0</button>
                    <button onclick="pressed('.')" class="btn" aria-label="Decimal">.</button>
                    <button onclick="calculate()" class="btn" aria-label="Equals">=</button>
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <p>&copy; 2024 Josimar Santos</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
